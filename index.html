    if (payload.links.ltv_weekly && payload.links.ltv_weekly !== '#') {
      const weeklyLink = document.createElement('a');
      weeklyLink.id = 'link-ltv-weekly';
      weeklyLink.href = abs(payload.links.ltv_weekly);
      weeklyLink.textContent = 'LTV by week';
      document.getElementById('link-accrual').before(weeklyLink);
    }
    document.getElementById('link-accrual').href = abs(payload.links.accrual);
    document.getElementById('link-audit').href = abs(payload.links.audit);

    document.getElementById('brief-home').innerHTML = payload.brief_home_html || '<p>每日经营 Agent 简报尚未生成。</p>';
    document.getElementById('incident-home').innerHTML = payload.incident_html || '<div class="incident-block no-incident"><p>暂无已登记的异常事件或经营事件/策略变更。</p></div>';
    document.getElementById('brief-full-link').href = abs(payload.links.brief);
    document.getElementById('workbench-action-link').href = abs(payload.links.workbench);

    document.getElementById('modules').innerHTML = payload.module_status.map(item => `
      <article class="module">
        <h3>${item.module}</h3>
        <span class="status ${String(item.status).toLowerCase()}">${item.status}</span>
        <p>频率：${item.frequency}；实际截止：${item.actual_cutoff}</p>
        <p>是否沿用：${item.reused}；原因：${item.reason}</p>
        <p>业务含义：${item.business_meaning}</p>
        <p>下次刷新：${item.next_refresh}</p>
        <p>${item.note}</p>
        <a href="${item.href}">打开模块</a>
      </article>
    `).join('');
    document.getElementById('module-status-table').innerHTML = `
      <table>
        <thead><tr><th>模块</th><th>刷新频率</th><th>本次状态</th><th>实际产物截止日</th><th>是否沿用旧产物</th><th>沿用/刷新原因</th><th>业务含义</th><th>下次刷新日</th></tr></thead>
        <tbody>
          ${payload.module_status.map(item => `
            <tr>
              <td>${item.module}</td>
              <td>${item.frequency}</td>
              <td>${item.status}</td>
              <td>${item.actual_cutoff}</td>
              <td>${item.reused}</td>
              <td>${item.reason}</td>
              <td>${item.business_meaning}</td>
              <td>${item.next_refresh}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    document.getElementById('audit-note').textContent = payload.meta.snapshot_note;
  </script>
</body>
</html>
