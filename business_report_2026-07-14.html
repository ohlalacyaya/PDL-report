<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统一经营分析入口</title>
  <style>
    :root {
      --bg: #f5f7f4;
      --panel: #ffffff;
      --ink: #18201d;
      --muted: #64706a;
      --line: #dbe2dc;
      --green: #087443;
      --blue: #2457c5;
      --amber: #9a5b00;
      --red: #b42318;
      --head: #e8f3ee;
      --soft: #f1f4ef;
      --shadow: 0 10px 24px rgba(27, 39, 32, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }
    .shell {
      width: min(1480px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 4px 0 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 760;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      max-width: 760px;
    }
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 360px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #39433e;
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.ok { color: var(--green); background: #ecf8f0; border-color: #cbead5; font-weight: 720; }
    .pill.warn { color: var(--amber); background: #fff6df; border-color: #f0dfb5; font-weight: 720; }
    .pill.fail { color: var(--red); background: #fff3f3; border-color: #efc7c7; font-weight: 720; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    nav a {
      text-decoration: none;
      color: #26312c;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 680;
    }
    nav a:hover { border-color: #97b7a6; background: #f7fbf8; }
    main .shell { padding-top: 18px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 94px;
      box-shadow: var(--shadow);
    }
    .kpi-label { color: var(--muted); font-size: 12px; margin-bottom: 9px; }
    .kpi-value { font-size: 22px; line-height: 1.15; font-weight: 760; white-space: nowrap; }
    .kpi-sub { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.45; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .wide { grid-column: 1 / -1; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    h2 { margin: 0; font-size: 16px; line-height: 1.35; }
    .unit { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .chart { height: 330px; width: 100%; }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .module {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      min-height: 146px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .module h3 { margin: 0; font-size: 15px; }
    .module p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 12px; }
    .module a {
      margin-top: auto;
      display: inline-flex;
      width: fit-content;
      text-decoration: none;
      color: var(--blue);
      font-size: 13px;
      font-weight: 720;
    }
    .status {
      width: fit-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 760;
    }
    .status.pass, .status.checked { color: var(--green); background: #ecf8f0; }
    .status.reused, .status.reused_existing_target_day { color: var(--blue); background: #eef4ff; }
    .status.stale_reused { color: var(--amber); background: #fff6df; }
    .status.pending { color: var(--amber); background: #fff6df; }
    .audit {
      margin-top: 14px;
      background: #fffaf0;
      border: 1px solid #eadbb8;
      border-radius: 8px;
      padding: 13px 15px;
      color: #5d410b;
      font-size: 13px;
      line-height: 1.7;
    }
    .brief-home {
      font-size: 14px;
      line-height: 1.75;
    }
    .brief-home h2 {
      margin: 22px 0 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 17px;
    }
    .brief-home h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }
    .brief-home h3 { margin: 16px 0 8px; font-size: 15px; }
    .brief-home p { margin: 8px 0; color: #26312c; }
    .brief-home ul { margin: 8px 0 14px; padding-left: 20px; }
    .brief-home li { margin: 4px 0; }
    .brief-home .diagnosis-block { margin: 0 0 18px; }
    .brief-home .lead {
      font-size: 16px;
      line-height: 1.85;
      color: #17211d;
      font-weight: 650;
      background: #f4faf6;
      border: 1px solid #d7eadf;
      border-radius: 8px;
      padding: 13px 15px;
    }
    .brief-home .conclusion-stack {
      display: grid;
      gap: 9px;
      background: #f4faf6;
      border: 1px solid #d7eadf;
      border-radius: 8px;
      padding: 13px 15px;
    }
    .brief-home .conclusion-stack p {
      margin: 0;
      color: #17211d;
      font-size: 15px;
      line-height: 1.72;
      font-weight: 620;
    }
    .brief-home .conclusion-stack strong {
      color: #0f5132;
      font-weight: 780;
    }
    .incident-block {
      margin-top: 2px;
      border: 1px solid #f0dfb5;
      background: #fffaf0;
      border-radius: 8px;
      padding: 13px 15px;
      color: #3f2f0b;
    }
    .incident-block p {
      margin: 8px 0;
      line-height: 1.7;
      font-size: 14px;
    }
    .incident-block.no-incident {
      border-color: var(--line);
      background: #fbfcfa;
      color: #4b5a52;
    }
    .incident-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .incident-card {
      background: #fff;
      border: 1px solid #eadbb8;
      border-radius: 8px;
      padding: 12px;
    }
    .incident-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .incident-head strong {
      font-size: 13px;
      color: #5d410b;
    }
    .incident-head span {
      border: 1px solid #f0dfb5;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 760;
      color: var(--amber);
      background: #fff6df;
    }
    .incident-card dl {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 6px 10px;
      margin: 0;
      font-size: 13px;
      line-height: 1.65;
    }
    .incident-card dt {
      color: #75520a;
      font-weight: 760;
    }
    .incident-card dd {
      margin: 0;
      color: #26312c;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .incident-card a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 720;
    }
    .incident-note {
      color: #5d410b;
    }
    #incident-panel {
      scroll-margin-top: 18px;
    }
    .status-table-wrap { margin-top: 12px; overflow: auto; }
    .brief-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .brief-actions a {
      display: inline-flex;
      text-decoration: none;
      color: var(--blue);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 720;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #edf1ea;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: var(--head); color: #315048; font-weight: 760; }
    .neg { color: var(--red); font-weight: 720; }
    .pos { color: var(--green); font-weight: 720; }
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid, .module-grid { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .status-strip { justify-content: flex-start; margin-top: 12px; min-width: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <div class="topbar">
        <div>
          <h1>统一经营分析入口</h1>

        </div>
        <div class="status-strip">
          <span class="pill ok">观察截止 2026-07-14</span>

      <nav>
        <a id="link-brief" href="#">每日简报</a>
        <a id="link-workbench" href="#">工作台</a>

  <main>

        <div class="brief-home" id="brief-home"></div>

      <section class="panel wide">
        <div class="panel-title"><h2>各 tab 数据状态</h2><span class="unit">点击进入细节页</span></div>

        <div class="status-table-wrap" id="module-status-table"></div>
        <div class="audit" id="audit-note"></div>
      </section>
    </div>
  </main>
  <script>
