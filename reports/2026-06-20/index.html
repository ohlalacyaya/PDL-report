<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统一经营分析入口</title>
  <style>
    :root {
      --bg: #f5f7f4;
      --panel: #ffffff;
      --ink: #18201d;
      --muted: #64706a;
      --line: #dbe2dc;
      --green: #087443;
      --blue: #2457c5;
      --amber: #9a5b00;
      --red: #b42318;
      --head: #e8f3ee;
      --soft: #f1f4ef;
      --shadow: 0 10px 24px rgba(27, 39, 32, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }
    .shell {
      width: min(1480px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 4px 0 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 760;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      max-width: 760px;
    }
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 360px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #39433e;
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.ok { color: var(--green); background: #ecf8f0; border-color: #cbead5; font-weight: 720; }
    .pill.warn { color: var(--amber); background: #fff6df; border-color: #f0dfb5; font-weight: 720; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    nav a {
      text-decoration: none;
      color: #26312c;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 680;
    }
    nav a:hover { border-color: #97b7a6; background: #f7fbf8; }
    main .shell { padding-top: 18px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 94px;
      box-shadow: var(--shadow);
    }
    .kpi-label { color: var(--muted); font-size: 12px; margin-bottom: 9px; }
    .kpi-value { font-size: 22px; line-height: 1.15; font-weight: 760; white-space: nowrap; }
    .kpi-sub { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.45; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .wide { grid-column: 1 / -1; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    h2 { margin: 0; font-size: 16px; line-height: 1.35; }
    .unit { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .chart { height: 330px; width: 100%; }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .module {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      min-height: 146px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .module h3 { margin: 0; font-size: 15px; }
    .module p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 12px; }
    .module a {
      margin-top: auto;
      display: inline-flex;
      width: fit-content;
      text-decoration: none;
      color: var(--blue);
      font-size: 13px;
      font-weight: 720;
    }
    .status {
      width: fit-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 760;
    }
    .status.pass, .status.checked { color: var(--green); background: #ecf8f0; }
    .status.pending { color: var(--amber); background: #fff6df; }
    .audit {
      margin-top: 14px;
      background: #fffaf0;
      border: 1px solid #eadbb8;
      border-radius: 8px;
      padding: 13px 15px;
      color: #5d410b;
      font-size: 13px;
      line-height: 1.7;
    }
    .brief-home {
      font-size: 14px;
      line-height: 1.75;
    }
    .brief-home h2 {
      margin: 22px 0 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 17px;
    }
    .brief-home h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }
    .brief-home h3 { margin: 16px 0 8px; font-size: 15px; }
    .brief-home p { margin: 8px 0; color: #26312c; }
    .brief-home ul { margin: 8px 0 14px; padding-left: 20px; }
    .brief-home li { margin: 4px 0; }
    .brief-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .brief-actions a {
      display: inline-flex;
      text-decoration: none;
      color: var(--blue);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 720;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #edf1ea;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: var(--head); color: #315048; font-weight: 760; }
    .neg { color: var(--red); font-weight: 720; }
    .pos { color: var(--green); font-weight: 720; }
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid, .module-grid { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .status-strip { justify-content: flex-start; margin-top: 12px; min-width: 0; }
    }
  </style>
</head>

  <script>
    const payload = {"meta": {"title": "统一经营分析入口", "data_date": "2026-06-20", "snapshot_note": "默认使用运行日 2026-06-21 的前一完整自然日 2026-06-20 作为目标观察截止日；低频模块会使用不晚于该日期的最近一次产物，并在模块卡片中展示实际区间。", "latest_month": "2026-06", "latest_full_take_month": "2026-05"}, "links": {"brief": "每日经营Agent简报_2026-06-20.html", "workbench": "可视化工作台原型.html", "accrual": "data/manual_exports/monthly_accrual_operating/2026-01-01_2026-06-18_obs_2026-06-18/monthly_accrual_operating_2026-01-01_2026-06-18_obs_2026-06-18_matrix.html", "whitelist": "data/manual_exports/whitelist_cohort/2026-03-01_2026-06-20_obs_2026-06-20/T2_13_whitelist_cohort_t0_t7_t30_cum_conversion_2026-03-01_2026-06-20_obs_2026-06-20.html", "ltv": "LTV_首贷月Cohort复购对比可视化_2026-01_obs_2026-06-19.html", "ltv_weekly": "#", "audit": "业务Agent刷新审核记录_2026-06-20.md"}, "brief_home_html": "<h2>结论</h2>\n<p>昨日整体放款 888 单，较近 7 日均值 +13.97%；合同金额 15,568,750 NGN，较近 7 日均值 -0.18%。核心判断：订单增长主要来自白名单首贷 / SmartNaira，白名单首贷放款增量中，约 75% 来自前端用信申请量增加，约 21% 来自放款成功率提升，约 4% 为交互项；继续向前拆，前端量增加主要来自注册基数变大。</p>\n<h2>关键证据</h2>\n<table><thead><tr><th>指标</th><th>昨日</th><th>近7日均值</th><th>差异</th></tr></thead><tbody>\n<tr><td>整体放款订单</td><td>888</td><td>779</td><td>+13.97%</td></tr>\n<tr><td>整体合同金额</td><td>15,568,750 NGN</td><td>15,596,250 NGN</td><td>-0.18%</td></tr>\n<tr><td>首贷放款订单</td><td>534</td><td>404</td><td>+130</td></tr>\n<tr><td>复贷放款订单合计</td><td>354</td><td>375</td><td>-21</td></tr>\n<tr><td>结清复贷 / 主贷</td><td>309</td><td>328</td><td>-19</td></tr>\n<tr><td>加贷</td><td>45</td><td>47</td><td>-2</td></tr>\n</tbody></table>\n<ul>\n<li>主增量：白名单 source 首贷放款较近 7 日多 130 单；SmartNaira App 首贷放款多 139 单；整体 App 维度主要由 SmartNaira 多 123 单拉动。</li>\n</ul>\n<h2>主因拆解：白名单首贷</h2>\n<ul>\n<li>一句话归因：白名单首贷放款增量中，约 75% 来自前端用信申请量增加，约 21% 来自放款成功率提升，约 4% 为交互项；继续向前拆，前端量增加主要来自注册基数变大。</li>\n<li>供给侧：新增白名单记录较近 7 日少 5,528，本次增长不应归因为当天供给放大。</li>\n<li>注册侧：白名单注册较近 7 日多 280 人，是前半段增长的主驱动。</li>\n<li>注册到进件：T0 进件率仅小幅提升 +1.55pp，不是主要解释。</li>\n<li>进件到用信申请：转化率下降 -0.38pp，用信申请增长来自进件量变多，而不是该段转化变好。</li>\n</ul>\n<table><thead><tr><t
