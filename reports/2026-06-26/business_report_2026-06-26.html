<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统一经营分析入口</title>
  <style>
    :root {
      --bg: #f5f7f4;
      --panel: #ffffff;
      --ink: #18201d;
      --muted: #64706a;
      --line: #dbe2dc;
      --green: #087443;
      --blue: #2457c5;
      --amber: #9a5b00;
      --red: #b42318;
      --head: #e8f3ee;
      --soft: #f1f4ef;
      --shadow: 0 10px 24px rgba(27, 39, 32, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }
    .shell {
      width: min(1480px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 4px 0 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 760;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      max-width: 760px;
    }
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 360px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #39433e;
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.ok { color: var(--green); background: #ecf8f0; border-color: #cbead5; font-weight: 720; }
    .pill.warn { color: var(--amber); background: #fff6df; border-color: #f0dfb5; font-weight: 720; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    nav a {
      text-decoration: none;
      color: #26312c;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 680;
    }
    nav a:hover { border-color: #97b7a6; background: #f7fbf8; }
    main .shell { padding-top: 18px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 94px;
      box-shadow: var(--shadow);
    }
    .kpi-label { color: var(--muted); font-size: 12px; margin-bottom: 9px; }
    .kpi-value { font-size: 22px; line-height: 1.15; font-weight: 760; white-space: nowrap; }
    .kpi-sub { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.45; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .wide { grid-column: 1 / -1; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    h2 { margin: 0; font-size: 16px; line-height: 1.35; }
    .unit { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .chart { height: 330px; width: 100%; }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .module {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      min-height: 146px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .module h3 { margin: 0; font-size: 15px; }
    .module p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 12px; }
    .module a {
      margin-top: auto;
      display: inline-flex;
      width: fit-content;
      text-decoration: none;
      color: var(--blue);
      font-size: 13px;
      font-weight: 720;
    }
    .status {
      width: fit-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 760;
    }
    .status.pass, .status.checked { color: var(--green); background: #ecf8f0; }
    .status.reused, .status.reused_existing_target_day { color: var(--blue); background: #eef4ff; }
    .status.stale_reused { color: var(--amber); background: #fff6df; }
    .status.pending { color: var(--amber); background: #fff6df; }
    .audit {
      margin-top: 14px;
      background: #fffaf0;
      border: 1px solid #eadbb8;
      border-radius: 8px;
      padding: 13px 15px;
      color: #5d410b;
      font-size: 13px;
      line-height: 1.7;
    }
    .brief-home {
      font-size: 14px;
      line-height: 1.75;
    }
    .brief-home h2 {
      margin: 22px 0 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 17px;
    }
    .brief-home h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }
    .brief-home h3 { margin: 16px 0 8px; font-size: 15px; }
    .brief-home p { margin: 8px 0; color: #26312c; }
    .brief-home ul { margin: 8px 0 14px; padding-left: 20px; }
    .brief-home li { margin: 4px 0; }
    .brief-home .diagnosis-block { margin: 0 0 18px; }
    .brief-home .lead {
      font-size: 16px;
      line-height: 1.85;
      color: #17211d;
      font-weight: 650;
      background: #f4faf6;
      border: 1px solid #d7eadf;
      border-radius: 8px;
      padding: 13px 15px;
    }
    .status-table-wrap { margin-top: 12px; overflow: auto; }
    .brief-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .brief-actions a {
      display: inline-flex;
      text-decoration: none;
      color: var(--blue);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 720;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #edf1ea;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: var(--head); color: #315048; font-weight: 760; }
    .neg { color: var(--red); font-weight: 720; }
    .pos { color: var(--green); font-weight: 720; }
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid, .module-grid { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .status-strip { justify-content: flex-start; margin-top: 12px; min-width: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <div class="topbar">
        <div>
          <h1>统一经营分析入口</h1>
        <div class="subtitle">首页展示跨模块经营诊断；工作台、白名单、LTV、权责等模块作为明细入口继续保留，并区分日更/周更/月更产物状态。</div>
        </div>
        <div class="status-strip">
          <span class="pill ok">观察截止 2026-06-26</span>
          <span class="pill ok">完整日口径</span>
          <span class="pill">口径版本：现金流 Take Rate</span>
        </div>
      </div>
      <nav>
        <a id="link-brief" href="#">每日简报</a>
        <a id="link-workbench" href="#">工作台</a>
        <a id="link-whitelist" href="#">白名单</a>
        <a id="link-ltv" href="#">LTV by month</a>
        <a id="link-accrual" href="#">权责</a>
        <a id="link-audit" href="#">审核记录</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="shell">
      <section class="panel wide">
        <div class="panel-title"><h2>跨模块经营诊断</h2><span class="unit">经营结果 -> 结构变化 -> 核心拖累 -> 质量护栏 -> 下一步动作</span></div>
        <div class="brief-home" id="brief-home"></div>
        <div class="brief-actions">
          <a id="brief-full-link" href="#">打开完整简报</a>
          <a id="workbench-action-link" href="#">进入工作台看明细</a>
        </div>
      </section>

      <section class="panel wide">
        <div class="panel-title"><h2>各 tab 数据状态</h2><span class="unit">点击进入细节页</span></div>
        <div class="module-grid" id="modules"></div>
        <div class="status-table-wrap" id="module-status-table"></div>
        <div class="audit" id="audit-note"></div>
      </section>
    </div>
  </main>
  <script>
    const payload = {"meta": {"title": "统一经营分析入口", "data_date": "2026-06-26", "snapshot_note": "默认使用运行日 2026-06-27 的前一完整自然日 2026-06-26 作为目标观察截止日；低频模块会使用不晚于该日期的最近一次产物，并在模块卡片中展示实际区间。", "latest_month": "2026-06", "latest_full_take_month": "2026-05"}, "links": {"brief": "daily_agent_brief_2026-06-26.html", "workbench": "workbench.html", "accrual": "accrual.html", "whitelist": "whitelist_cohort.html", "ltv": "ltv_month.html", "ltv_weekly": "ltv_week.html", "audit": "#"}, "brief_home_html": "<section class=\"diagnosis-block\">
<h2>今日一句话结论</h2>
<p class=\"lead\">观察日 2026-06-26 为订单下滑但金额托底的结构分化日：放款订单 580 单，较近 7 日均值 -11.66%，但合同金额 NGN 13.9M 仅 -0.35%；金额端主要由复贷占比提升 +9.44pp 和单均合同金额提升 +NGN 2,728 托底。核心拖累来自白名单首贷 -111 单，自然量异常放款 31 单对首贷缺口形成口径性抵消，需 P0 核查；复贷净增 +11 单，其中加贷 +15 单、主贷复贷 -3 单，复贷/加贷托底需要用成熟风险和回收指标验证是否健康。</p>
</section>
<section class=\"diagnosis-block\"><h2>关键经营结果</h2>
<table><thead><tr><th>指标</th><th>观察日</th><th>近7日均值</th><th>差异</th><th>业务判断</th></tr></thead><tbody><tr><td>放款订单</td><td>580</td><td>657</td><td>-11.66%</td><td>订单明显下滑</td></tr><tr><td>合同金额</td><td>NGN 13.9M</td><td>NGN 14.0M</td><td>-0.35%</td><td>金额基本持平，被结构托底</td></tr><tr><td>单均合同金额</td><td>NGN 24,022</td><td>NGN 21,295</td><td>+NGN 2,728</td><td>单均抬升</td></tr><tr><td>复贷订单占比</td><td>66.03%</td><td>56.59%</td><td>+9.44pp</td><td>复贷占比提升</td></tr></tbody></table>
</section>
<section class=\"diagnosis-block\"><h2>核心问题拆解</h2>
<table><thead><tr><th>层级</th><th>变化</th><th>属性</th><th>业务判断</th></tr></thead><tbody><tr><td>整体放款缺口</td><td>-77</td><td>父级问题</td><td>订单量下滑是观察日经营主问题</td></tr><tr><td>首贷净缺口</td><td>-88</td><td>整体缺口的主来源</td><td>首贷需要优先拆 source 和关键漏斗</td></tr><tr><td>白名单首贷</td><td>-111</td><td>首贷内部核心拖累</td><td>白名单触达/注册/进件/授信/用信/放款链路需拆解</td></tr><tr><td>自然量异常</td><td>+31</td><td>异常抵消项</td><td>当前口径下不应放款，不能当健康增量</td></tr><tr><td>复贷净变化</td><td>+11</td><td>托底项</td><td>复贷对整体形成抵消，但需要验证质量</td></tr><tr><td>主贷复贷</td><td>-3</td><td>复贷内部小缺口</td><td>主贷复贷没有贡献主要托底</td></tr><tr><td>加贷</td><td>+15</td><td>复贷内部托底</td><td>加贷形成托底，需要关注风险后置</td></tr></tbody></table>
<p>这组关系需要按父子结构看：整体订单缺口先拆首贷/复贷；首贷内部再拆白名单和自然量，其中自然量属于异常抵消项；复贷内部再拆主贷复贷和加贷。</p>
<p>首页中的白名单首贷缺口来自工作台日更漏斗数据，观察日为 2026-06-26；白名单专题 tab 是 cohort 专题产物，本次未生成 2026-06-26 产物，沿用 2026-06-26 最近真实产物。</p>
</section>
<section class=\"diagnosis-block\"><h2>首贷链路补充判断</h2>
<table><thead><tr><th>指标</th><th>观察日</th><th>近7日均值</th><th>差异</th><th>下一步含义</th></tr></thead><tbody><tr><td>首贷授信成功率</td><td>31.79%</td><td>37.99%</td><td>-6.20pp</td><td>下降则拆风控拒绝、额度、策略</td></tr><tr><td>首贷用信率</td><td>57.59%</td><td>76.64%</td><td>-19.05pp</td><td>下降则拆授信后未用信、额度可用性、用户意愿</td></tr><tr><td>首贷用信申请数</td><td>230</td><td>412</td><td>-182</td><td>承接首贷放款缺口的后段分子</td></tr></tbody></table>
<p>首贷问题不能只归因到白名单放款少，授信成功率、用信率和用信申请数共同决定后段承接，需要按 App、source、白名单批次、风控策略、额度和拒绝原因继续拆。</p>
</section>
<section class=\"diagnosis-block\"><h2>风险与质量护栏</h2>
<table><thead><tr><th>护栏</th><th>最新可用值</th><th>比较基准</th><th>较基准</th><th>业务含义</th></tr></thead><tbody><tr><td>FPD0</td><td>2026-06-19 / 53.76%</td><td>较近 7 个成熟放款日</td><td>+1.48pp</td><td>成熟窗口指标，不能直接归因观察日</td></tr><tr><td>FPD7</td><td>2026-06-12 / 43.10%</td><td>较近 7 个成熟放款日</td><td>-1.19pp</td><td>验证风险是否持续</td></tr><tr><td>M1</td><td>2026-05-20 / 51.70%</td><td>较近 7 个成熟观察点</td><td>+8.73pp</td><td>更成熟的坏账/回收压力信号</td></tr><tr><td>催收回收</td><td>2026-06-26 / 总案件 1,783 / 总回收 NGN 5.1M / 总回收率 15.88% / S0 33.31% / S1 7.02%</td><td>较近 7 个观察日</td><td>总 +2.92pp / S0 +11.57pp / S1 -4.19pp</td><td>用于验证复贷/加贷托底是否带来贷后压力</td></tr><tr><td>LTV</td><td>2026-04 mature cohort / net take -3.81% / 复购 40.51%；2026-06 cohort 未成熟/不适用，不输出 take rate / 复购率结论</td><td>周更沿用 2026-06-21 产物</td><td>不适用</td><td>用于验证首贷 cohort 长期价值，首页不展示未成熟 cohort 空值</td></tr><tr><td>权责</td><td>2026-05 / Take Rate 3.18%</td><td>月更沿用 2026-06-18 产物</td><td>不适用</td><td>用于验证金额托底后的利润质量</td></tr></tbody></table>
<p>风险与回收指标不能直接归因到 2026-06-26 观察日放款，但它们用于验证当前复贷/加贷和高单均金额托底是否健康。</p>
</section>
