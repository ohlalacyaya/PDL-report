<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>统一经营分析入口</title>
  <style>
    :root {
      --bg: #f5f7f4;
      --panel: #ffffff;
      --ink: #18201d;
      --muted: #64706a;
      --line: #dbe2dc;
      --green: #087443;
      --blue: #2457c5;
      --amber: #9a5b00;
      --red: #b42318;
      --head: #e8f3ee;
      --soft: #f1f4ef;
      --shadow: 0 10px 24px rgba(27, 39, 32, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }
    .shell {
      width: min(1480px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 4px 0 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 760;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      max-width: 760px;
    }
    .status-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 360px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #39433e;
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.ok { color: var(--green); background: #ecf8f0; border-color: #cbead5; font-weight: 720; }
    .pill.warn { color: var(--amber); background: #fff6df; border-color: #f0dfb5; font-weight: 720; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    nav a {
      text-decoration: none;
      color: #26312c;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 680;
    }
    nav a:hover { border-color: #97b7a6; background: #f7fbf8; }
    main .shell { padding-top: 18px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 94px;
      box-shadow: var(--shadow);
    }
    .kpi-label { color: var(--muted); font-size: 12px; margin-bottom: 9px; }
    .kpi-value { font-size: 22px; line-height: 1.15; font-weight: 760; white-space: nowrap; }
    .kpi-sub { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.45; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .wide { grid-column: 1 / -1; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    h2 { margin: 0; font-size: 16px; line-height: 1.35; }
    .unit { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .chart { height: 330px; width: 100%; }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .module {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      min-height: 146px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .module h3 { margin: 0; font-size: 15px; }
    .module p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 12px; }
    .module a {
      margin-top: auto;
      display: inline-flex;
      width: fit-content;
      text-decoration: none;
      color: var(--blue);
      font-size: 13px;
      font-weight: 720;
    }
    .status {
      width: fit-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 760;
    }
    .status.pass, .status.checked { color: var(--green); background: #ecf8f0; }
    .status.pending { color: var(--amber); background: #fff6df; }
    .audit {
      margin-top: 14px;
      background: #fffaf0;
      border: 1px solid #eadbb8;
      border-radius: 8px;
      padding: 13px 15px;
      color: #5d410b;
      font-size: 13px;
      line-height: 1.7;
    }
    .brief-home {
      font-size: 14px;
      line-height: 1.75;
    }
    .brief-home h2 {
      margin: 22px 0 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 17px;
    }
    .brief-home h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }
    .brief-home h3 { margin: 16px 0 8px; font-size: 15px; }
    .brief-home p { margin: 8px 0; color: #26312c; }
    .brief-home ul { margin: 8px 0 14px; padding-left: 20px; }
    .brief-home li { margin: 4px 0; }
    .brief-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .brief-actions a {
      display: inline-flex;
      text-decoration: none;
      color: var(--blue);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 720;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #edf1ea;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: var(--head); color: #315048; font-weight: 760; }
    .neg { color: var(--red); font-weight: 720; }
    .pos { color: var(--green); font-weight: 720; }
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid, .module-grid { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .status-strip { justify-content: flex-start; margin-top: 12px; min-width: 0; }
    }
  </style>
</head>

      <nav>

  <main>
    <div class="shell">
      <section class="panel wide">
        <div class="panel-title"><h2>每日经营 Agent 简报</h2><span class="unit">首页摘要</span></div>

      </section>
    </div>
  </main>
  <script>
    const payload = {"meta": {"title": "统一经营分析入口", "data_date": "2026-06-24", "snapshot_note": "默认使用运行日 2026-06-25 的前一完整自然日 2026-06-24 作为目标观察截止日；低频模块会使用不晚于该日期的最近一次产物，并在模块卡片中展示实际区间。", "latest_month": "2026-06", "latest_full_take_month": "2026-05"}, "links": {"brief": "每日经营Agent简报_2026-06-24.html", "workbench": "可视化工作台原型.html", "accrual": "data/manual_exports/monthly_accrual_operating/2026-01-01_2026-06-18_obs_2026-06-18/monthly_accrual_operating_2026-01-01_2026-06-18_obs_2026-06-18_matrix.html", "whitelist": "data/manual_exports/whitelist_cohort/2026-03-01_2026-06-24_obs_2026-06-24/T2_13_whitelist_cohort_t0_t7_t30_cum_conversion_2026-03-01_2026-06-24_obs_2026-06-24.html", "ltv": "LTV_首贷月Cohort复购对比可视化_2026-01_obs_2026-06-21.html", "ltv_weekly": "LTV_首贷7天滚动Cohort复购对比可视化_2026-01_obs_2026-06-21.html", "audit": "业务Agent刷新审核记录_2026-06-24.md"}, "brief_home_html": "<h2>经营诊断结论</h2>\n<ul>\n<li>观察日类型：结构分化日。</li>\n<li>整体表现：整体放款 801 单，较近 7 日均值 +12.25%；合同金额 16,657,500 NGN，较近 7 日均值 +18.84%。</li>\n<li>主贡献：复贷拉动 +118 单（结清复贷/主贷 +99、加贷 +19）；App 维度 SmartNaira 拉动 +74 单</li>\n<li>主拖累：首贷拖累 -31 单；白名单首贷拖累 -61 单</li>\n<li>结构性问题：整体增长但首贷缺口 31 单；白名单首贷缺口 61 单</li>\n<li>异常风险：自然量放款 30 单；FPD0 较前 7 个成熟放款日上升 +1.82pp</li>\n</ul>\n<h2>整体订单金额</h2>\n<table><thead><tr><th>指标</th><th>昨日</th><th>近7日均值</th><th>差异</th><th>诊断</th></tr></thead><tbody>\n<tr><td>放款订单</td><td>801</td><td>714</td><td>+12.25%</td><td>增量拉动</td></tr>\n<tr><td>合同金额</td><td>16,657,500 NGN</td><td>14,016,671 NGN</td><td>+18.84%</td><td>金额同步增长</td></tr>\n</tbody></table>\n<ul>\n<li>订单和金额同向增长，规模端表现一致。</li>\n</ul>\n<h2>首贷/复贷</h2>\n<table><thead><tr><th>模块</th><th>昨日</th><th>近7日均值</th><th>差异</th><th>诊断</th></tr></thead><tbody>\n<tr><td>首贷放款</td><td>315</td><td>346</td><td>-31</td><td>首贷缺口 -31 单</td></tr>\n<tr><td>复贷放款</td><td>486</td><td>368</td><td>+118</td><td>复贷增量 +118 单</td></tr>\n<tr><td>结清复贷 / 主贷</td><td>423</td><td>324</td><td>+99</td><td>主贷增量 +99 单</td></tr>\n<tr><td>加贷</td><td>63</td><td>44</td><td>+19</td><td>加贷增量 +19 单</td></tr>\n</tbody></table>\n<ul>\n<li>复贷是当日主要拉动项，其中结清复贷/主贷 +99 单，加贷 +19 单。</li>\n<li>首贷在整体增长中逆势形成缺口，需单独拆白名单首贷和自然量口径。</li>\n</ul>\n<h2>App/source</h2>\n<table><thead><tr><th>维度层</th><th>维度值</th><th>指标</th><th>昨日</th><th>近7日均值</th><th>差异</th><th>诊断</th></tr></thead><tbody>\n<tr><td>App</td><td>SmartNaira</td><td>整体放款</td><td>721</td><td>647</td><td>+74</td><td>SmartNaira增量 +74 单</td></tr>\n<tr><td>App</td><td>SkyLend</td><td>整体放款</td><td>80</td><td>67</td><td>+13</td><td>SkyLend增量 +13 单</td></tr>\n<tr><td>Source</td><td>白名单</td><td>首贷放款</td><td>285</td><td>346</td><td>-61</td><td>白名单缺口 -61 单</td></tr>\n<tr><td>Source</td><td>自然量</td><td>首贷放款</td><td>30</td><td>0</td><td>+30</td><td>自然量增量 +30 单</td></tr>\n</tbody></table>\n<ul>\n<li>App 维度主要拉动来自 SmartNaira；需要和首复贷结构一起看，不能直接等同于白名单首贷主因。</li>\n<li>Source 维度最大拖累来自 白名单，首贷放款较近 7 日少 61 单。</li>\n</ul>\n<h2>关键漏斗</h2>\n<h3>白名单首贷漏斗（缺口项）</h3>\n<ul>\n<li>这段解释的是整体增长中的首贷结构隐患，不作为整体增长主因。</li>\n<li>一句话归因：白名单首贷放款缺口中，约 68% 来自前端用信申请量减少，约 36% 来自放款成功率下降；继续向前拆，前端量减少主要看注册、进件和进件到用信申请。</li>\n<li>供给侧：新增白名单记录较近 7 日多 692，但白名单首贷仍下降，说明主要问题不在新增供给量。</li>\n<li>注册侧：白名单注册较近 7 日多 125 人，但放款仍下降，需要优先看后续转化。</li>\n<li>注册到进件：T0 进件率下降 -1.72pp，进件变化主要由注册基数抵消。</li>\n<li>进件到用信申请：尽管进件数较近 7 日多 44，但转化率下降 -7.52pp，导致用信申请较近 7 日少 45。</li>\n</ul>\n<table><thead><tr><th>环节</th><th>昨日</th><th>近7日均值</th><th>差异</th></tr></thead><tbody>\n<tr><td>新增白名单记录</td><td>20,364</td><td>19,672</td><td>+692</td></tr>\n<tr><td>白名单注册人数</td><td>885</td><td>760</td><td>+125</td></tr>\n<tr><td>进件数</td><td>877</td><td>833</td><td>+44</td></tr>\n<tr><td>用信申请数</td><td>362</td><td>407</td><td>-45</td></tr>\n<tr><td>放款数</td><td>285</td><td>346</td><td>-61</td></tr>\n<tr><td>授信通过率</td><td>65.22%</td><td>55.02%</td><td>+10.20pp</td></tr>\n<tr><td>进件到用信申请率</td><td>41.28%</td><td>48.80%</td><td>-7.52pp</td></tr>\n<tr><td>用信申请到放款率</td><td>78.73%</td><td>84.18%</td><td>-5.45pp</td></tr>\n</tbody></table>\n<p>关键节点：</p>\n<ul>\n<li>授信通过率提升 +10.20pp；分母 进件数 877，较近7日 +44，分子 授信通过数 572，较近7日 +104。按 `进件数 × 转化率` 粗拆，转化率变化贡献约 +89 单，是该节点的直接解释。</li>\n<li>进件到用信申请率下降 -7.52pp；分母 进件数 877，较近7日 +44，分子 用信申请数 362，较近7日 -45。按 `进件数 × 转化率` 粗拆，转化率变化贡献约 -66 单，是该节点的直接解释。</li>\n</ul>\n<h3>复贷漏斗</h3>\n<table><thead><tr><th>环节</th><th>昨日</th><th>近7日均值</th><th>差异</th></tr></thead><tbody>\n<tr><td>主贷结清用户数</td><td>465</td><td>410</td><td>+55</td></tr>\n<tr><td>主贷T0再进件率</td><td>69.89%</td><td>67.36%</td><td>+2.53pp</td></tr>\n<tr><td>主贷进件数</td><td>564</td><td>526</td><td>+38</td></tr>\n<tr><td>主贷授信通过率</td><td>73.05%</td><td>71.83%</td><td>+1.22pp</td></tr>\n<tr><td>主贷用信申请数</td><td>443</td><td>366</td><td>+77</td></tr>\n<tr><td>主贷放款成功率</td><td>95.49%</td><td>89.06%</td><td>+6.43pp</td></tr>\n<tr><td>主贷放款数</td><td>423</td><td>324</td><td>+99</td></tr>\n<tr><td>加贷进件数</td><td>76</td><td>64</td><td>+12</td></tr>\n<tr><td>加贷放款成功率</td><td>82.89%</td><td>67.96%</td><td>+14.93pp</td></tr>\n<tr><td>加贷放款数</td><td>63</td><td>44</td><td>+19</td></tr>\n</tbody></table>\n<h2>风险异常</h2>\n<table><thead><tr><th>风险项</th><th>最近可观察日</th><th>当前</th><th>近7日基准</th><th>差异</th><th>诊断</th></tr></thead><tbody>\n<tr><td>FPD0</td><td>2026-06-17</td><td>53.49%</td><td>51.67%</td><td>+1.82pp</td><td>风险抬升</td></tr>\n<tr><td>FPD7</td><td>2026-06-10</td><td>46.56%</td><td>45.13%</td><td>+1.43pp</td><td>风险抬升</td></tr>\n</tbody></table>\n<ul>\n<li>风险维度定位：FPD0 最高 App=SmartNaira 54.25%，FPD0 最高 Source=白名单 53.83%，FPD0 最高类型=加贷 63.27%，FPD7 最高 App=SkyLend 49.23%，FPD7 最高 Source=白名单 46.82%，FPD7 最高首复贷=首贷 47.58%，FPD7 最高类型=首贷 47.58%。</li>\n</ul>\n<h2>下一步动作</h2>\n<table><thead><tr><th>动作</th><th>查什么</th><th>为什么查</th></tr></thead><tbody>\n<tr><td>核对自然量放款订单明细</td><td>查 source、app、注册来源、白名单匹配、放款订单号</td><td>当前口径下自然量不应放款，需确认是归因错误还是链路异常</td></tr>\n<tr><td>验证复贷增长质量</td><td>查结清池、T0 再进件、主贷/加贷放款成功状态、对应 FPD0/FPD7</td><td>复贷是主拉动项，需要确认增长来自正常客群而不是风险放量</td></tr>\n<tr><td>拆白名单首贷缺口</td><td>查白名单注册、进件、授信通过、用信申请、放款成功状态，并按 App/source/category_date 交叉</td><td>白名单首贷逆势下降，需定位缺口发生在前端量还是转化节点</td></tr>\n<tr><td>跟踪 FPD0 抬升来源</td><td>查 App、source、首复贷、主贷/加贷、额度段和策略版本</td><td>规模变化如果伴随早逾抬升，需要判断是否为客群结构或
